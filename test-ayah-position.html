<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'KFGQPCHafs';
    src: url('./public/assets/fonts/hafs.ttf') format('truetype');
  }
  .ayah-marker {
    display: inline-block;
    position: relative;
    width: 2em;
    height: 2em;
    vertical-align: middle;
    margin: 0 0.2em;
  }
  .ayah-symbol {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'KFGQPCHafs', serif;
    font-size: 2.5em;
    color: rgba(4, 120, 87, 0.5);
    line-height: 1;
  }
  .ayah-num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: sans-serif;
    font-size: 0.8em;
    font-weight: bold;
    color: #1e293b;
    margin-top: 0.1em;
  }
</style>
</head>
<body style="font-size: 40px; direction: rtl; text-align: center;">
  بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ
  <span class="ayah-marker">
    <span class="ayah-symbol">۝</span>
    <span class="ayah-num">١٢٣</span>
  </span>
  الْحَمْدُ لِلَّهِ
</body>
</html>
